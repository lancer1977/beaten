<div class="wally-container">
 
    <div class="header"> 
      <button (click)="howLongToBeat()">H.L.T.B.</button>
      <input type="text" placeholder="Search games by title..." [ngModel]="search" (ngModelChange)="onSearchInput($event)"  />
      @if(search !== '') {
        <button class="clear-btn" (click)="clearSearch()" title="Clear search">✕</button>
      }
  
      <select  title="Console Selected" [(ngModel)]="selectedConsole" (change)="filterGames()">
        @for(item of consoles; track item){
        <option [value]="item">{{ item }}</option>
        }
      </select>

      <select title="Status" [(ngModel)]="selectedStatus" (change)="filterGames()">
        @for(item of statuses; track item){
        <option [value]="item">{{ item === 'All' ? 'Status' : item }}</option>
        }
      </select>

      <select title="Genre" [(ngModel)]="selectedGenre" (change)="filterGames()">
        @for(item of genres; track item){
        <option [value]="item">{{ item === 'All' ? 'Genre' : item }}</option>
        }
      </select>

      <select title="Region" [(ngModel)]="selectedRegion" (change)="filterGames()">
        @for(item of regions; track item){
        <option [value]="item">{{ item === 'All' ? 'Region' : item }}</option>
        }
      </select>

      <select title="Image Selected" [(ngModel)]="selectedImageType" (change)="updateBaseGames()">
        <option value="boxart-small">boxart</option>
        <option value="marquee">marquee</option>
      </select>

      <select title="Sort By" [(ngModel)]="sortBy" (change)="filterGames()">
        @for(opt of sortOptions; track opt.value){
        <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>

      <!-- Sheet Selection -->
      <select title="Sheet Selection" [(ngModel)]="selectedSheetId" (change)="onSheetChange(selectedSheetId)">
        @for(sheet of availableSheets; track sheet.sheetId){
        <option [value]="sheet.sheetId">{{ sheet.name || 'Custom Sheet' }}</option>
        }
      </select>

      @if(filtersActive) {
        <button class="clear-filters-btn" (click)="clearFilters()" title="Reset all filters">Reset</button>
        <span class="filter-indicator">●</span>
      }

      <h3  >{{ streamerName || 'SEGAFAN001' }}</h3>
    </div>
  
    @if(visibleGames.length === 0 && games.length > 0) {
      <div class="empty-state">
        <p>No games match your filters.</p>
        <button (click)="clearFilters()">Clear Filters</button>
      </div>
    }

    <div class="itemcontainer">

        @for(item of visibleGames; track item){
            <div  class="item">
                <img  [src]="item.url" alt="{{ item.game }}" loading="lazy" (error)="onImageError($event)"/>
                <div class="gametitle" (click)="launch(item.game)"  >
                  <p ><strong>{{ item.game }}</strong></p>
                  <p>{{ item.console }}</p>
                </div>               
      </div>
        }

    </div>
  </div>
